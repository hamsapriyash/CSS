<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .container{
            height:544px;
            width:100%;
            border:2px solid black;
            display:flex;
        }
        .item{
            width: 200px;
            height: 200px;
            background-color: tomato;
            border:2px solid green;
            margin: 10px;
            padding: 3px;
        }
        #item-2{
            flex-grow: 3;
            flex-shrink: 3;
            flex-basis: 160px;
        }
        #item-{
            flex: 2 2 230px;
        }
        </style>
</head>
<body>
    <h1>Flex Box</h1>
    <div class="container">
        <div class="item" id="item-1">Item 1</div>
        <div class="item" id="item-2">Item 2</div>
        <div class="item" id="item-3">Item 3</div>
        <div class="item" id="item-4">Item 4</div>
        <div class="item" id="item-5">Item 5</div>
        <div class="item" id="item-6">Item 6</div>
    </div> 
</body>
</html>
